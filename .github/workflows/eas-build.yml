name: CI (tests & checks)

# Free CI only — runs on GitHub's runners and never spends EAS build credits.
# EAS builds are intentionally NOT triggered here. Ship a build manually from the
# EAS dashboard or via `eas workflow:run` / `eas build` (see CLAUDE.md → CI/CD).

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

  platform-smoke:
    name: Platform smoke (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - path: native
            pattern: native/app
          - path: pwa
            pattern: pwa
          - path: browser
            pattern: browser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run platform smoke test
        run: npm test -- --runTestsByPath src/__tests__/platformSmoke.test.ts --testNamePattern "${{ matrix.pattern }}"
