name: EAS Build & Submit

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

  platform-smoke:
    name: Platform smoke (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - path: native
            pattern: native/app
          - path: pwa
            pattern: pwa
          - path: browser
            pattern: browser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run platform smoke test
        run: npm test -- --runTestsByPath src/__tests__/platformSmoke.test.ts --testNamePattern "${{ matrix.pattern }}"

  build-ios:
    name: Build iOS & Submit to TestFlight
    needs: [test, platform-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: ^12.0.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS authentication
        run: eas whoami

      - name: Install dependencies
        run: npm ci

      - name: Build and submit to TestFlight
        run: |
          eas build --platform ios --profile production --non-interactive --auto-submit 2>&1 | tee build-output.txt
          echo "### EAS Build (iOS)" >> $GITHUB_STEP_SUMMARY
          grep -oP 'https://expo.dev/accounts/\S+' build-output.txt >> $GITHUB_STEP_SUMMARY || true

  build-android:
    if: ${{ false }} # Disabled: replaced by EAS Workflow in .eas/workflows/build-and-submit-android.yml
    name: Build Android & Submit to Play Store (disabled)
    needs: [test, platform-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: ^12.0.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS authentication
        run: eas whoami

      - name: Install dependencies
        run: npm ci

      - name: Write Google Play service account key
        run: printf '%s\n' "$GOOGLE_SERVICE_ACCOUNT_JSON" > play-store-service-account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Build and submit to Play Store
        run: |
          eas build --platform android --profile production --non-interactive --auto-submit 2>&1 | tee build-output.txt
          echo "### EAS Build (Android)" >> $GITHUB_STEP_SUMMARY
          grep -oP 'https://expo.dev/accounts/\S+' build-output.txt >> $GITHUB_STEP_SUMMARY || true
