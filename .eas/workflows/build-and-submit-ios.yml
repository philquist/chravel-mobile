name: Build and submit iOS (manual)
# Manual-only: no push trigger so it never auto-runs and burns EAS build credits.
# Run on demand from the EAS dashboard ("Run workflow") or `eas workflow:run build-and-submit-ios.yml`.
on:
  workflow_dispatch: {}
jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production
  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
