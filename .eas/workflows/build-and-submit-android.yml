name: Build and submit Android (manual)
# Manual-only: no push trigger so it never auto-runs and burns EAS build credits.
# Run on demand from the EAS dashboard ("Run workflow") or `eas workflow:run build-and-submit-android.yml`.
on:
  workflow_dispatch: {}
jobs:
  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: production
  submit_android:
    name: Submit to Google Play (Production)
    needs: [build_android]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
